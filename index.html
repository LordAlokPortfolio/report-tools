<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operations Toolkit</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      background: white;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      color: #2c3e50;
      margin-bottom: 10px;
      font-size: 36px;
    }
    .subtitle {
      color: #7f8c8d;
      margin-bottom: 40px;
      font-size: 16px;
    }
    .tools-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 30px;
    }
    .tool-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 30px;
      border-radius: 8px;
      text-decoration: none;
      color: white;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      text-align: center;
    }
    .tool-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    .tool-card.ncr {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }
    .tool-card.paint {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    }
    .tool-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }
    .tool-title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .tool-desc {
      font-size: 14px;
      opacity: 0.9;
    }
    @media (max-width: 600px) {
      .tools-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛠️ Operations Toolkit</h1>
    <p class="subtitle">Internal workflow automation tools</p>
    
    <div class="tools-grid">
      <a href="ncr-generator.html" class="tool-card ncr">
        <div class="tool-icon">📋</div>
        <div class="tool-title">NCR Generator</div>
        <div class="tool-desc">Non-conformance report creation</div>
      </a>
      
      <a href="paint-report-reader.html" class="tool-card paint">
        <div class="tool-icon">🎨</div>
        <div class="tool-title">Paint Report Reader</div>
        <div class="tool-desc">Vinyl extrusion paint tracking</div>
      </a>
    </div>
  </div>
</body>
</html>
