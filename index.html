<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operations Toolkit</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #fff;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
      padding: 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 32px;
      margin-bottom: 8px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
    }

    .header p {
      font-size: 14px;
      opacity: 0.95;
      font-weight: 500;
    }

    .badge {
      display: inline-block;
      background: rgba(255, 255, 255, 0.25);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      margin-top: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .content {
      padding: 40px;
      color: #333;
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .tool-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 30px;
      border-radius: 8px;
      text-decoration: none;
      color: white;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .tool-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    }

    .tool-card.ncr {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }

    .tool-card.paint {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    }

    .tool-card.material {
      background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
    }

    .tool-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .tool-title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .tool-desc {
      font-size: 14px;
      opacity: 0.9;
    }

    @media (max-width: 600px) {
      .tools-grid {
        grid-template-columns: 1fr;
      }
      .header h1 {
        font-size: 24px;
      }
      .content {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🛠️ OPERATIONS TOOLKIT</h1>
      <p>WORKFLOW AUTOMATION TOOLS</p>
      <div class="badge">100% LOCAL • NO DATA LEAVES YOUR COMPUTER</div>
    </div>

    <div class="content">
      <div class="tools-grid">
        <a href="ncr-generator.html" class="tool-card ncr">
          <div class="tool-icon">📋</div>
          <div class="tool-title">NCR Generator</div>
          <div class="tool-desc">Non-conformance report creation</div>
        </a>
        
        <a href="paint-report-reader.html" class="tool-card paint">
          <div class="tool-icon">🎨</div>
          <div class="tool-title">Paint Report Reader</div>
          <div class="tool-desc">Vinyl extrusion paint tracking</div>
        </a>

        <a href="material-transfer-form.html" class="tool-card material">
          <div class="tool-icon">📦</div>
          <div class="tool-title">Material Transfer Form</div>
          <div class="tool-desc">Inter-company inventory transfers</div>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
