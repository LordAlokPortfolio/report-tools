<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Material Transfer Form</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      color: #333;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
      border-bottom: 3px solid #1e5a96;
      padding-bottom: 15px;
    }

    .header h1 {
      color: #1e5a96;
      font-size: 28px;
      margin-bottom: 10px;
    }

    .form-section {
      margin-bottom: 30px;
      padding: 20px;
      background: #f9f9f9;
      border-left: 4px solid #1e5a96;
      border-radius: 4px;
    }

    .section-title {
      background: #1e5a96;
      color: white;
      padding: 12px;
      margin: -20px -20px 15px -20px;
      font-weight: 600;
      border-radius: 4px 4px 0 0;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .form-grid.full {
      grid-template-columns: 1fr;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      font-weight: 600;
      margin-bottom: 8px;
      color: #1e5a96;
      font-size: 14px;
    }

    .form-group input,
    .form-group textarea {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 60px;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #1e5a96;
      background: #f0f7ff;
    }

    .two-column {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
      background: white;
    }

    th {
      background: #34495e;
      color: white;
      padding: 12px;
      text-align: left;
      font-weight: 600;
      font-size: 14px;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
    }

    tr:hover {
      background: #f9f9f9;
    }

    input[type="number"] {
      text-align: right;
    }

    .total-row {
      background: #e8f4f8 !important;
      font-weight: 700;
    }

    .total-row td {
      border-top: 2px solid #1e5a96;
    }

    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 30px;
    }

    .btn {
      padding: 12px 30px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #1e5a96 0%, #2a7fb8 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(30, 90, 150, 0.3);
    }

    .btn-secondary {
      background: #95a5a6;
      color: white;
    }

    .btn-secondary:hover {
      background: #7f8c8d;
    }

    .remove-row {
      background: #e74c3c;
      color: white;
      padding: 6px 12px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
    }

    .remove-row:hover {
      background: #c0392b;
    }

    .signature-box {
      min-height: 80px;
      border: 1px dashed #ddd;
      padding: 10px;
      border-radius: 4px;
      background: #f9f9f9;
    }

    .notes-section {
      margin-top: 20px;
    }

    .status-message {
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 20px;
      display: none;
    }

    .status-message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .status-message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    @media (max-width: 768px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
      .two-column {
        grid-template-columns: 1fr;
      }
      table {
        font-size: 12px;
      }
      td, th {
        padding: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📦 MATERIAL TRANSFER FORM</h1>
    </div>

    <div id="statusMessage" class="status-message"></div>

    <form id="mtfForm">
      <!-- Form Header Section -->
      <div class="form-section">
        <div class="section-title">FORM INFORMATION</div>
        <div class="form-grid">
          <div class="form-group">
            <label>Form #:</label>
            <input type="text" id="formNumber" placeholder="Auto-generated">
          </div>
          <div class="form-group">
            <label>Date:</label>
            <input type="date" id="formDate" required>
          </div>
        </div>
      </div>

      <!-- From Company Section -->
      <div class="form-section">
        <div class="section-title">FROM (TRANSFERRING COMPANY)</div>
        <div class="form-grid">
          <div class="form-group">
            <label>Company Name:</label>
            <input type="text" id="fromCompany" placeholder="e.g., KV CUSTOM WINDOWS & DOORS" required>
          </div>
          <div class="form-group">
            <label>Department:</label>
            <input type="text" id="fromDept" placeholder="e.g., GLASS" required>
          </div>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label>Contact Person:</label>
            <input type="text" id="fromContact" placeholder="Name" required>
          </div>
          <div class="form-group">
            <label>Location / Suite:</label>
            <input type="text" id="fromLocation" placeholder="Location" required>
          </div>
        </div>
        <div class="form-grid full">
          <div class="form-group">
            <label>Email:</label>
            <input type="email" id="fromEmail" placeholder="email@example.com">
          </div>
        </div>
      </div>

      <!-- To Company Section -->
      <div class="form-section">
        <div class="section-title">TO (RECEIVING COMPANY)</div>
        <div class="form-grid">
          <div class="form-group">
            <label>Company Name:</label>
            <input type="text" id="toCompany" placeholder="e.g., Universal Glass Tech Inc" required>
          </div>
          <div class="form-group">
            <label>Department:</label>
            <input type="text" id="toDept" placeholder="Department" required>
          </div>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label>Contact Person:</label>
            <input type="text" id="toContact" placeholder="Name" required>
          </div>
          <div class="form-group">
            <label>Location / Suite:</label>
            <input type="text" id="toLocation" placeholder="Location" required>
          </div>
        </div>
        <div class="form-grid full">
          <div class="form-group">
            <label>Email:</label>
            <input type="email" id="toEmail" placeholder="email@example.com">
          </div>
        </div>
      </div>

      <!-- Material Details Section -->
      <div class="form-section">
        <div class="section-title">MATERIAL DETAILS</div>
        <table>
          <thead>
            <tr>
              <th style="width: 40px;">#</th>
              <th>Item / Part Number</th>
              <th>Description</th>
              <th>Unit of Measure</th>
              <th>Qty Transferred</th>
              <th style="width: 80px;"></th>
            </tr>
          </thead>
          <tbody id="materialRows">
            <tr>
              <td>1</td>
              <td><input type="text" class="partNumber" placeholder="Part #"></td>
              <td><input type="text" class="description" placeholder="Description"></td>
              <td><input type="text" class="uom" placeholder="Unit"></td>
              <td><input type="number" class="quantity" min="0" value="0" step="0.01"></td>
              <td><button type="button" class="remove-row" onclick="removeRow(this)">Remove</button></td>
            </tr>
          </tbody>
        </table>

        <button type="button" class="btn btn-secondary" onclick="addRow()">+ Add Row</button>

        <div style="text-align: right; margin-top: 15px; padding: 15px; background: #f0f7ff; border-radius: 4px;">
          <strong>TOTAL ITEMS:</strong> <span id="totalItems" style="font-size: 18px; color: #1e5a96;">0</span>
        </div>
      </div>

      <!-- Purpose / Reason Section -->
      <div class="form-section">
        <div class="section-title">PURPOSE / REASON FOR TRANSFER</div>
        <div class="form-group full">
          <label>Reason:</label>
          <textarea id="reason" placeholder="Explain the reason for this material transfer..." required></textarea>
        </div>
      </div>

      <!-- Authorization & Signatures Section -->
      <div class="form-section">
        <div class="section-title">AUTHORIZATION & SIGNATURES</div>
        <div class="form-grid">
          <div class="form-group">
            <label>Released By (From Co.):</label>
            <input type="text" id="releasedByName" placeholder="Name / Initials" required>
          </div>
          <div class="form-group">
            <label>Signature:</label>
            <div class="signature-box"></div>
          </div>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label>Date:</label>
            <input type="date" id="releasedByDate" required>
          </div>
        </div>

        <hr style="margin: 20px 0; border: none; border-top: 1px solid #ddd;">

        <div class="form-grid">
          <div class="form-group">
            <label>Received By (To Co.):</label>
            <input type="text" id="receivedByName" placeholder="Name / Initials" required>
          </div>
          <div class="form-group">
            <label>Signature:</label>
            <div class="signature-box"></div>
          </div>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label>Date:</label>
            <input type="date" id="receivedByDate" required>
          </div>
        </div>
      </div>

      <!-- Notes Section -->
      <div class="form-section">
        <div class="section-title">NOTES</div>
        <div class="form-group">
          <textarea id="notes" placeholder="Additional notes or comments..."></textarea>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="buttons">
        <button type="button" class="btn btn-secondary" onclick="resetForm()">Clear Form</button>
        <button type="button" class="btn btn-primary" onclick="exportToExcel()">📊 Export to Excel</button>
        <button type="button" class="btn btn-primary" onclick="saveLocal()">💾 Save (Local)</button>
      </div>
    </form>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <script>
    // Set today's date as default
    document.getElementById('formDate').valueAsDate = new Date();
    document.getElementById('releasedByDate').valueAsDate = new Date();
    document.getElementById('receivedByDate').valueAsDate = new Date();

    // Load data from local storage on page load
    window.addEventListener('load', () => {
      loadLocal();
      updateTotals();
    });

    function addRow() {
      const tbody = document.getElementById('materialRows');
      const rowCount = tbody.rows.length + 1;
      
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${rowCount}</td>
        <td><input type="text" class="partNumber" placeholder="Part #"></td>
        <td><input type="text" class="description" placeholder="Description"></td>
        <td><input type="text" class="uom" placeholder="Unit"></td>
        <td><input type="number" class="quantity" min="0" value="0" step="0.01"></td>
        <td><button type="button" class="remove-row" onclick="removeRow(this)">Remove</button></td>
      `;
      
      tbody.appendChild(row);
      
      // Update row numbers
      updateRowNumbers();
      updateTotals();
    }

    function removeRow(btn) {
      btn.closest('tr').remove();
      updateRowNumbers();
      updateTotals();
    }

    function updateRowNumbers() {
      const rows = document.querySelectorAll('#materialRows tr');
      rows.forEach((row, index) => {
        row.cells[0].textContent = index + 1;
      });
    }

    function updateTotals() {
      const quantities = document.querySelectorAll('.quantity');
      let total = 0;
      quantities.forEach(q => {
        total += parseFloat(q.value) || 0;
      });
      document.getElementById('totalItems').textContent = total.toFixed(2);
    }

    // Add event listeners to quantity inputs
    document.addEventListener('input', (e) => {
      if (e.target.classList.contains('quantity')) {
        updateTotals();
      }
    });

    function resetForm() {
      if (confirm('Clear all form data?')) {
        document.getElementById('mtfForm').reset();
        document.getElementById('formDate').valueAsDate = new Date();
        document.getElementById('releasedByDate').valueAsDate = new Date();
        document.getElementById('receivedByDate').valueAsDate = new Date();
        updateTotals();
      }
    }

    function saveLocal() {
      const formData = {
        formNumber: document.getElementById('formNumber').value,
        formDate: document.getElementById('formDate').value,
        fromCompany: document.getElementById('fromCompany').value,
        fromDept: document.getElementById('fromDept').value,
        fromContact: document.getElementById('fromContact').value,
        fromLocation: document.getElementById('fromLocation').value,
        fromEmail: document.getElementById('fromEmail').value,
        toCompany: document.getElementById('toCompany').value,
        toDept: document.getElementById('toDept').value,
        toContact: document.getElementById('toContact').value,
        toLocation: document.getElementById('toLocation').value,
        toEmail: document.getElementById('toEmail').value,
        reason: document.getElementById('reason').value,
        releasedByName: document.getElementById('releasedByName').value,
        releasedByDate: document.getElementById('releasedByDate').value,
        receivedByName: document.getElementById('receivedByName').value,
        receivedByDate: document.getElementById('receivedByDate').value,
        notes: document.getElementById('notes').value,
        materials: []
      };

      // Collect material rows
      document.querySelectorAll('#materialRows tr').forEach(row => {
        const cells = row.querySelectorAll('input');
        formData.materials.push({
          partNumber: cells[0].value,
          description: cells[1].value,
          uom: cells[2].value,
          quantity: cells[3].value
        });
      });

      localStorage.setItem('mtfForm', JSON.stringify(formData));
      showMessage('Form saved locally', 'success');
    }

    function loadLocal() {
      const saved = localStorage.getItem('mtfForm');
      if (saved) {
        const formData = JSON.parse(saved);
        
        document.getElementById('formNumber').value = formData.formNumber || '';
        document.getElementById('formDate').value = formData.formDate || '';
        document.getElementById('fromCompany').value = formData.fromCompany || '';
        document.getElementById('fromDept').value = formData.fromDept || '';
        document.getElementById('fromContact').value = formData.fromContact || '';
        document.getElementById('fromLocation').value = formData.fromLocation || '';
        document.getElementById('fromEmail').value = formData.fromEmail || '';
        document.getElementById('toCompany').value = formData.toCompany || '';
        document.getElementById('toDept').value = formData.toDept || '';
        document.getElementById('toContact').value = formData.toContact || '';
        document.getElementById('toLocation').value = formData.toLocation || '';
        document.getElementById('toEmail').value = formData.toEmail || '';
        document.getElementById('reason').value = formData.reason || '';
        document.getElementById('releasedByName').value = formData.releasedByName || '';
        document.getElementById('releasedByDate').value = formData.releasedByDate || '';
        document.getElementById('receivedByName').value = formData.receivedByName || '';
        document.getElementById('receivedByDate').value = formData.receivedByDate || '';
        document.getElementById('notes').value = formData.notes || '';

        // Load materials
        const tbody = document.getElementById('materialRows');
        tbody.innerHTML = '';
        if (formData.materials && formData.materials.length > 0) {
          formData.materials.forEach((material, index) => {
            const row = document.createElement('tr');
            row.innerHTML = `
              <td>${index + 1}</td>
              <td><input type="text" class="partNumber" value="${material.partNumber}"></td>
              <td><input type="text" class="description" value="${material.description}"></td>
              <td><input type="text" class="uom" value="${material.uom}"></td>
              <td><input type="number" class="quantity" min="0" value="${material.quantity}" step="0.01"></td>
              <td><button type="button" class="remove-row" onclick="removeRow(this)">Remove</button></td>
            `;
            tbody.appendChild(row);
          });
        }
      }
    }

    function exportToExcel() {
      const data = [
        ['MATERIAL TRANSFER FORM'],
        [],
        ['Form #:', document.getElementById('formNumber').value, 'Date:', document.getElementById('formDate').value],
        [],
        ['FROM (TRANSFERRING COMPANY)', '', '', '', '', 'TO (RECEIVING COMPANY)'],
        ['Company Name:', document.getElementById('fromCompany').value, '', '', '', 'Company Name:', document.getElementById('toCompany').value],
        ['Department:', document.getElementById('fromDept').value, '', '', '', 'Department:', document.getElementById('toDept').value],
        ['Contact Person:', document.getElementById('fromContact').value, '', '', '', 'Contact Person:', document.getElementById('toContact').value],
        ['Location / Suite:', document.getElementById('fromLocation').value, '', '', '', 'Location / Suite:', document.getElementById('toLocation').value],
        ['Email:', document.getElementById('fromEmail').value, '', '', '', 'Email:', document.getElementById('toEmail').value],
        [],
        ['MATERIAL DETAILS'],
        ['#', 'Item / Part Number', 'Description', 'Unit of Measure', 'Qty Transferred'],
      ];

      // Add material rows
      document.querySelectorAll('#materialRows tr').forEach((row, index) => {
        const cells = row.querySelectorAll('input');
        data.push([
          index + 1,
          cells[0].value,
          cells[1].value,
          cells[2].value,
          cells[3].value
        ]);
      });

      // Calculate total
      let total = 0;
      document.querySelectorAll('.quantity').forEach(q => {
        total += parseFloat(q.value) || 0;
      });

      data.push(['', '', '', 'TOTAL ITEMS:', total.toFixed(2)]);
      data.push([]);
      data.push(['PURPOSE / REASON FOR TRANSFER']);
      data.push([document.getElementById('reason').value]);
      data.push([]);
      data.push(['NOTES']);
      data.push([document.getElementById('notes').value]);
      data.push([]);
      data.push(['AUTHORIZATION & SIGNATURES']);
      data.push(['Released By (From Co.):', document.getElementById('releasedByName').value, 'Date:', document.getElementById('releasedByDate').value]);
      data.push(['Received By (To Co.):', document.getElementById('receivedByName').value, 'Date:', document.getElementById('receivedByDate').value]);

      const ws = XLSX.utils.aoa_to_sheet(data);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'MTF');
      XLSX.writeFile(wb, `MaterialTransferForm_${new Date().toISOString().split('T')[0]}.xlsx`);
      
      showMessage('Form exported to Excel', 'success');
    }

    function showMessage(msg, type) {
      const statusDiv = document.getElementById('statusMessage');
      statusDiv.textContent = msg;
      statusDiv.className = `status-message ${type}`;
      
      setTimeout(() => {
        statusDiv.className = 'status-message';
      }, 3000);
    }
  </script>
</body>
</html>
